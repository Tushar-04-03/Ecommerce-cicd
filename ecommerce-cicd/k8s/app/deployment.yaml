apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-deployment
  namespace: default
  labels:
    app: ecommerce
spec:
  replicas: 2                         # Run 2 copies for high availability
  selector:
    matchLabels:
      app: ecommerce
  strategy:
    type: RollingUpdate               # Zero-downtime rolling updates
    rollingUpdate:
      maxSurge: 1                     # Add 1 extra pod during update
      maxUnavailable: 0               # Never take a pod down before new one is up
  template:
    metadata:
      labels:
        app: ecommerce
      annotations:
        prometheus.io/scrape: "true"  # Tell Prometheus to scrape this pod
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: ecommerce
          image: YOUR_DOCKERHUB_USERNAME/ecommerce-app:latest   # Replace YOUR_DOCKERHUB_USERNAME
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service
  namespace: default
spec:
  selector:
    app: ecommerce
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
